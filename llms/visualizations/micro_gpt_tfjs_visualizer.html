<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro GPT (TensorFlow.js) Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #121a32;
      --line: #2c3e78;
      --text: #e8edff;
      --muted: #9aa8d9;
      --btn: #26469b;
      --btn-hover: #335fce;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { margin-top: 0; }
    .small { color: var(--muted); font-size: 13px; }
    .controls {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-6 { grid-column: span 6; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: var(--muted); }
    input, button {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0c1430;
      color: var(--text);
    }
    button { background: var(--btn); cursor: pointer; font-weight: 600; }
    button:hover { background: var(--btn-hover); }
    .metrics { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .chip { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
    .row { display: grid; gap: 12px; grid-template-columns: 2fr 1fr; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
    .panel-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    canvas { width: 100%; height: 180px; border: 1px solid #1e2b57; border-radius: 8px; background: #0a1127; }
    pre {
      margin: 0;
      padding: 8px;
      border: 1px solid #1d2852;
      border-radius: 8px;
      background: #0a1024;
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
      font-size: 12px;
    }
    @media (max-width: 920px) {
      .controls { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .span-2, .span-3, .span-6 { grid-column: span 2; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Micro GPT Name Model (TensorFlow.js)</h1>
  <p class="small">A clean rewrite: download names, train a tiny GPT-style model in-browser, and visualize matrix snapshots.</p>

  <div class="controls">
    <div><label>Embedding dim</label><input id="nEmbd" type="number" min="8" max="128" step="8" value="32"></div>
    <div><label>Heads</label><input id="nHead" type="number" min="1" max="8" value="4"></div>
    <div><label>Block size</label><input id="blockSize" type="number" min="4" max="24" value="10"></div>
    <div><label>Batch size</label><input id="batchSize" type="number" min="8" max="512" step="8" value="48"></div>
    <div><label>Learning rate</label><input id="lr" type="number" step="0.0001" value="0.003"></div>
    <div><label>Total steps</label><input id="totalSteps" type="number" min="10" max="20000" value="1200"></div>

    <div><label>Eval every N steps</label><input id="evalEvery" type="number" min="10" max="2000" value="100"></div>
    <div><label>Samples per eval</label><input id="sampleCount" type="number" min="1" max="8" value="3"></div>
    <div><label>Temperature</label><input id="temperature" type="number" min="0.2" max="2" step="0.1" value="0.9"></div>
    <div><label>Train split</label><input id="trainFrac" type="number" min="0.5" max="0.99" step="0.01" value="0.9"></div>
    <div class="span-2"><label>Visualize matrices (comma-separated)</label><input id="matrixFilter" value="wte,wq,wk,wv,wo,ff1,ff2,lmHead"></div>

    <div class="span-3"><button id="presetBtn">Fast preset</button></div>
    <div class="span-3"><button id="loadBtn">1) Download Dataset</button></div>
    <div class="span-2"><button id="initBtn">2) Initialize Model</button></div>
    <div class="span-2"><button id="startBtn">3) Start Training</button></div>
    <div class="span-2"><button id="stopBtn">Stop</button></div>
  </div>

  <div class="metrics">
    <div class="chip">Names: <span id="dataOut">0</span></div>
    <div class="chip">Vocab: <span id="vocabOut">0</span></div>
    <div class="chip">Step: <span id="stepOut">0</span></div>
    <div class="chip">Train loss: <span id="trainLossOut">-</span></div>
    <div class="chip">Val loss: <span id="valLossOut">-</span></div>
  </div>

  <div class="row">
    <div class="panel">
      <h3>Matrix visualizations</h3>
      <div id="matrixGrid" class="panel-grid"></div>
    </div>
    <div class="panel">
      <h3>Samples</h3>
      <pre id="sampleOut">(train to generate names)</pre>
      <h3>Log</h3>
      <pre id="logOut"></pre>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/karpathy/makemore/refs/heads/master/names.txt';
const BOS = '^';
const EOS = '$';

const state = {
  names: [], train: [], val: [],
  chars: [], stoi: new Map(), itos: new Map(),
  model: null, optimizer: null,
  running: false, step: 0,
  lastTrainLoss: null, lastValLoss: null,
};

const $ = (id) => document.getElementById(id);
const log = (msg) => {
  const el = $('logOut');
  el.textContent += `${new Date().toLocaleTimeString()} ${msg}\n`;
  el.scrollTop = el.scrollHeight;
};

function updateMetrics() {
  $('dataOut').textContent = state.names.length;
  $('vocabOut').textContent = state.chars.length;
  $('stepOut').textContent = state.step;
  $('trainLossOut').textContent = state.lastTrainLoss == null ? '-' : state.lastTrainLoss.toFixed(4);
  $('valLossOut').textContent = state.lastValLoss == null ? '-' : state.lastValLoss.toFixed(4);
}

async function loadDataset() {
  $('loadBtn').disabled = true;
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = await res.text();
    state.names = txt.split('\n').map(s => s.trim().toLowerCase()).filter(Boolean);
    log(`Loaded ${state.names.length} names.`);
  } catch (err) {
    state.names = ['emma', 'olivia', 'liam', 'noah', 'ava', 'mia', 'luna', 'sofia'];
    log(`Dataset fetch failed (${err.message}); using fallback names.`);
  } finally {
    updateMetrics();
    $('loadBtn').disabled = false;
  }
}

function buildVocab(trainFrac) {
  const set = new Set([BOS, EOS]);
  for (const n of state.names) for (const ch of n) set.add(ch);
  state.chars = [...set].sort();
  state.stoi = new Map(state.chars.map((c, i) => [c, i]));
  state.itos = new Map(state.chars.map((c, i) => [i, c]));

  const shuffled = [...state.names];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const split = Math.floor(shuffled.length * trainFrac);
  state.train = shuffled.slice(0, split);
  state.val = shuffled.slice(split);
  log(`Split: train=${state.train.length}, val=${state.val.length}.`);
  updateMetrics();
}

function randomBatch(names, blockSize, batchSize) {
  const bos = state.stoi.get(BOS);
  const eos = state.stoi.get(EOS);
  const xs = new Int32Array(batchSize * blockSize);
  const ys = new Int32Array(batchSize * blockSize);

  for (let b = 0; b < batchSize; b++) {
    const name = names[Math.floor(Math.random() * names.length)];
    const ids = [...`${BOS}${name}${EOS}`].map(ch => state.stoi.get(ch));
    const start = Math.floor(Math.random() * Math.max(1, ids.length - 1));
    for (let t = 0; t < blockSize; t++) {
      const src = start + t;
      const tgt = src + 1;
      xs[b * blockSize + t] = src < ids.length ? ids[src] : eos;
      ys[b * blockSize + t] = tgt < ids.length ? ids[tgt] : eos;
      if (t === 0 && xs[b * blockSize + t] == null) xs[b * blockSize + t] = bos;
    }
  }

  return {
    x: tf.tensor2d(xs, [batchSize, blockSize], 'int32'),
    y: tf.tensor2d(ys, [batchSize, blockSize], 'int32'),
  };
}

function createModel(cfg) {
  const V = state.chars.length;
  const C = cfg.nEmbd;
  const T = cfg.blockSize;
  const H = cfg.nHead;
  const D = C / H;
  if (C % H !== 0) throw new Error('Embedding dim must be divisible by heads.');

  const init = (shape, std = 0.02) => tf.variable(tf.randomNormal(shape, 0, std));
  return {
    cfg,
    wte: init([V, C]), wpe: init([T, C]),
    wq: init([C, C]), wk: init([C, C]), wv: init([C, C]), wo: init([C, C]),
    ff1: init([C, C * 4]), ff2: init([C * 4, C]),
    lmHead: init([C, V]),

    vars() {
      return [this.wte, this.wpe, this.wq, this.wk, this.wv, this.wo, this.ff1, this.ff2, this.lmHead];
    },

    forward(x) {
      return tf.tidy(() => {
        const B = x.shape[0];
        const tok = tf.gather(this.wte, x);
        const pos = tf.gather(this.wpe, tf.range(0, T, 1, 'int32')).expandDims(0).tile([B, 1, 1]);
        let h = tok.add(pos);

        const flat = h.reshape([B * T, C]);
        const q = flat.matMul(this.wq).reshape([B, T, H, D]).transpose([0, 2, 1, 3]);
        const k = flat.matMul(this.wk).reshape([B, T, H, D]).transpose([0, 2, 1, 3]);
        const v = flat.matMul(this.wv).reshape([B, T, H, D]).transpose([0, 2, 1, 3]);

        let att = q.matMul(k, false, true).div(Math.sqrt(D));
        const mask = tf.linalg.bandPart(tf.ones([T, T]), -1, 0).reshape([1, 1, T, T]);
        const neg = tf.fill([1, 1, T, T], -1e9);
        att = tf.where(mask.cast('bool'), att, neg);
        const w = tf.softmax(att, -1);
        const ctx = w.matMul(v).transpose([0, 2, 1, 3]).reshape([B * T, C]).matMul(this.wo).reshape([B, T, C]);

        h = h.add(ctx);
        const ff = h.reshape([B * T, C]).matMul(this.ff1).relu().matMul(this.ff2).reshape([B, T, C]);
        h = h.add(ff);

        return h.reshape([B * T, C]).matMul(this.lmHead).reshape([B, T, V]);
      });
    },

    loss(x, y) {
      return tf.tidy(() => {
        const logits = this.forward(x).reshape([x.shape[0] * x.shape[1], V]);
        const labels = y.reshape([x.shape[0] * x.shape[1]]);
        const oneHot = tf.oneHot(labels, V);
        return tf.losses.softmaxCrossEntropy(oneHot, logits).mean();
      });
    },
  };
}

function drawHeatmap(canvas, arr, rows, cols) {
  const ctx = canvas.getContext('2d');
  const px = 6;
  canvas.width = Math.max(120, cols * px);
  canvas.height = Math.max(80, rows * px);

  let min = Infinity, max = -Infinity;
  for (const v of arr) { min = Math.min(min, v); max = Math.max(max, v); }
  const scale = (v) => (v - min) / (max - min + 1e-9);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const v = arr[r * cols + c];
      const t = scale(v);
      const rr = Math.floor(25 + t * 220);
      const bb = Math.floor(245 - t * 220);
      ctx.fillStyle = `rgb(${rr}, 75, ${bb})`;
      ctx.fillRect(c * px, r * px, px, px);
    }
  }
}

async function renderMatrices() {
  if (!state.model) return;
  const wanted = $('matrixFilter').value.split(',').map(s => s.trim()).filter(Boolean);
  const grid = $('matrixGrid');
  grid.innerHTML = '';

  for (const key of wanted) {
    const tensor = state.model[key];
    if (!tensor) continue;
    const vals = await tensor.data();
    const shape = tensor.shape;
    const rows = shape[0] || 1;
    const cols = shape[1] || 1;

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = `<div class="small"><b>${key}</b> [${shape.join(' × ')}]</div>`;
    const canvas = document.createElement('canvas');
    panel.appendChild(canvas);
    grid.appendChild(panel);
    drawHeatmap(canvas, vals, rows, cols);
  }
}

async function sampleName(temperature = 1.0, maxLen = 20) {
  if (!state.model) return '';
  const bos = state.stoi.get(BOS);
  const eos = state.stoi.get(EOS);
  const blockSize = state.model.cfg.blockSize;
  const tokens = [bos];

  for (let i = 0; i < maxLen; i++) {
    const ctx = new Int32Array(blockSize).fill(bos);
    const recent = tokens.slice(-blockSize);
    ctx.set(recent, blockSize - recent.length);

    const next = tf.tidy(() => {
      const x = tf.tensor2d(ctx, [1, blockSize], 'int32');
      const logits = state.model.forward(x).slice([0, blockSize - 1, 0], [1, 1, -1]).reshape([state.chars.length]);
      const scaled = logits.div(tf.scalar(Math.max(0.1, temperature)));
      const probs = tf.softmax(scaled);
      return tf.multinomial(probs, 1).dataSync()[0];
    });

    if (next === eos) break;
    tokens.push(next);
  }

  return tokens.slice(1).map(id => state.itos.get(id)).join('');
}

async function validateLoss(cfg) {
  const batch = randomBatch(state.val.length ? state.val : state.train, cfg.blockSize, Math.max(8, Math.floor(cfg.batchSize / 2)));
  const val = tf.tidy(() => state.model.loss(batch.x, batch.y).dataSync()[0]);
  batch.x.dispose();
  batch.y.dispose();
  return val;
}

async function train() {
  if (!state.model) throw new Error('Initialize model first.');
  const cfg = readCfg();
  state.running = true;
  $('startBtn').disabled = true;

  for (; state.step < cfg.totalSteps && state.running; state.step++) {
    const batch = randomBatch(state.train, cfg.blockSize, cfg.batchSize);
    const lossT = state.optimizer.minimize(() => state.model.loss(batch.x, batch.y), true, state.model.vars());
    state.lastTrainLoss = (await lossT.data())[0];
    batch.x.dispose();
    batch.y.dispose();
    lossT.dispose();

    if ((state.step + 1) % cfg.evalEvery === 0) {
      state.lastValLoss = await validateLoss(cfg);
      const samples = [];
      for (let i = 0; i < cfg.sampleCount; i++) {
        samples.push(await sampleName(cfg.temperature));
      }
      $('sampleOut').textContent = samples.join('\n');
      await renderMatrices();
      log(`step=${state.step + 1} train=${state.lastTrainLoss.toFixed(4)} val=${state.lastValLoss.toFixed(4)}`);
    }

    if ((state.step + 1) % 10 === 0) updateMetrics();
    await tf.nextFrame();
  }

  updateMetrics();
  state.running = false;
  $('startBtn').disabled = false;
  log('Training stopped.');
}

function readCfg() {
  return {
    nEmbd: Number($('nEmbd').value),
    nHead: Number($('nHead').value),
    blockSize: Number($('blockSize').value),
    batchSize: Number($('batchSize').value),
    lr: Number($('lr').value),
    totalSteps: Number($('totalSteps').value),
    evalEvery: Number($('evalEvery').value),
    sampleCount: Number($('sampleCount').value),
    temperature: Number($('temperature').value),
    trainFrac: Number($('trainFrac').value),
  };
}

$('presetBtn').onclick = () => {
  $('nEmbd').value = '24';
  $('nHead').value = '3';
  $('blockSize').value = '8';
  $('batchSize').value = '32';
  $('lr').value = '0.004';
  $('totalSteps').value = '400';
  $('evalEvery').value = '50';
  $('sampleCount').value = '3';
  $('temperature').value = '0.9';
  log('Applied fast preset.');
};

$('loadBtn').onclick = loadDataset;

$('initBtn').onclick = async () => {
  if (!state.names.length) await loadDataset();
  const cfg = readCfg();
  buildVocab(cfg.trainFrac);

  if (state.model) state.model.vars().forEach(v => v.dispose());
  state.model = createModel(cfg);
  state.optimizer = tf.train.adam(cfg.lr);
  state.step = 0;
  state.lastTrainLoss = null;
  state.lastValLoss = null;
  $('sampleOut').textContent = '(train to generate names)';
  await renderMatrices();
  updateMetrics();
  log('Model initialized.');
};

$('startBtn').onclick = async () => {
  try { await train(); }
  catch (err) {
    log(`Error: ${err.message}`);
    state.running = false;
    $('startBtn').disabled = false;
  }
};

$('stopBtn').onclick = () => {
  state.running = false;
};

updateMetrics();
</script>
</body>
</html>
